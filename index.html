<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Videojuegos Favoritos</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1a1a2e; color: #ffffff; font-family: 'Poppins', sans-serif; margin: 0; }
        .game-card { background: #16213e; border: 2px solid #0f3460; border-radius: 10px; overflow: hidden; transition: 0.3s; }
        .game-card:hover { border-color: #e94560; transform: scale(1.02); }
        .game-card img { width: 100%; height: 250px; object-fit: cover; }
        .game-info { padding: 20px; }
        .game-info h3 { font-family: 'Press Start 2P'; font-size: 12px; color: #e94560; margin: 0 0 15px; }
        #grid-juegos { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 40px; }
        @media (max-width: 600px) { #grid-juegos { padding: 20px; gap: 20px; } }
    </style>
</head>
<body>
    <nav style="background: #16213e; padding: 20px; text-align: center; border-bottom: 3px solid #e94560;">
        <span style="font-family: 'Press Start 2P', cursive; color: #e94560; font-size: 14px;">GameCenter</span>
    </nav>
    <h1 style="text-align: center; margin-top: 40px; font-family: 'Press Start 2P'; font-size: 20px;">TOP 5 VIDEOJUEGOS</h1>
    <div id="grid-juegos"></div>
</body>
</html>
