<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Videojuegos Favoritos</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #e94560; border-radius: 10px; }
        body { background-color: #1a1a2e; color: #ffffff; font-family: 'Poppins', sans-serif; margin: 0; }
        h1 { text-align: center; margin-top: 40px; font-family: 'Press Start 2P'; font-size: 20px; text-shadow: 4px 4px #e94560; } /* Efecto Neon */
        .game-card { background: #16213e; border: 2px solid #0f3460; border-radius: 10px; overflow: hidden; transition: 0.3s; }
        .game-card:hover { border-color: #e94560; transform: scale(1.02); }
        .game-card img { width: 100%; height: 250px; object-fit: cover; }
        .game-info { padding: 20px; }
        .game-info h3 { font-family: 'Press Start 2P'; font-size: 12px; color: #e94560; margin: 0 0 15px; }
        .game-info p { color: #f0f0f0; font-size: 14px; line-height: 1.6; }
        #grid-juegos { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 40px; }
        footer { text-align: center; padding: 30px; background: #16213e; color: #e94560; font-family: 'Press Start 2P'; font-size: 10px; border-top: 2px solid #0f3460; }
    </style>
</head>
<body>
    <nav style="background: #16213e; padding: 20px; text-align: center; border-bottom: 3px solid #e94560;">
        <span style="font-family: 'Press Start 2P', cursive; color: #e94560; font-size: 14px;">GameCenter</span>
    </nav>
    <h1>TOP 5 VIDEOJUEGOS</h1>
    <div id="grid-juegos">
        <div class="game-card"><img src="https://images.unsplash.com/photo-1627371111347-810626084605?q=80&w=400"><div class="game-info"><h3>Minecraft</h3><p>Construcción y creatividad.</p></div></div>
        <div class="game-card"><img src="https://images.unsplash.com/photo-1621333100617-649068779900?q=80&w=400"><div class="game-info"><h3>Roblox</h3><p>Plataforma de creación.</p></div></div>
        <div class="game-card"><img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=400"><div class="game-info"><h3>Free Fire</h3><p>Battle Royale móvil.</p></div></div>
        <div class="game-card"><img src="https://images.unsplash.com/photo-1589118949245-7d38baf380d6?q=80&w=400"><div class="game-info"><h3>GTA V</h3><p>Acción en mundo abierto.</p></div></div>
        <div class="game-card"><img src="https://images.unsplash.com/photo-1552667466-07f70402244a?q=80&w=400"><div class="game-info"><h3>FIFA / FC</h3><p>Simulador de fútbol.</p></div></div>
    </div>
    <footer>&copy; 2026 GameCenter - Taller de Videojuegos</footer>
</body>
</html>
